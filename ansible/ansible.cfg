[defaults]
inventory          = inventory.ini
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
forks              = 10

# Project layout:
#   ansible/
#     ansible.cfg         <- this file
#     inventory.ini       <- rendered by Terraform (do not edit by hand)
#     bootstrap.yml       <- one-shot setup for the fleet
#     roles/              <- (added in later phases)

[ssh_connection]
pipelining = True
